<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天中午吃什麼？ - 互動決定器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #334155;
            position: relative;
            overflow: hidden;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: #fff;
        }

        .needle {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #ef4444;
            z-index: 10;
        }

        .segment {
            position: absolute;
            width: 50%;
            height: 50%;
            left: 50%;
            top: 50%;
            transform-origin: 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            padding-left: 40px;
            box-sizing: border-box;
            font-size: 0.875rem;
        }

        .result-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        @keyframes confetti {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f00;
            animation: confetti 3s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">中午吃什麼？</h1>
            <p class="text-indigo-100 mt-1">別再糾結了，交給命運吧！</p>
        </div>

        <div class="p-6 flex flex-col items-center">
            <!-- Wheel Section -->
            <div class="wheel-container my-8">
                <div class="needle"></div>
                <div id="wheel">
                    <!-- Segments will be injected by JS -->
                </div>
            </div>

            <!-- Action Button -->
            <button id="spinBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold text-lg shadow-lg transform transition active:scale-95 mb-8">
                開始旋轉！
            </button>

            <!-- List Section -->
            <div class="w-full border-t border-slate-100 pt-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-slate-700">美食清單</h2>
                    <span id="itemCount" class="text-sm text-slate-400">0 個選項</span>
                </div>
                
                <div class="flex gap-2 mb-4">
                    <input type="text" id="itemInput" placeholder="新增想吃的..." class="flex-1 px-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <button id="addBtn" class="px-4 py-2 bg-slate-800 text-white rounded-xl hover:bg-slate-700 transition">新增</button>
                </div>

                <div id="itemList" class="space-y-2 max-h-48 overflow-y-auto pr-2 custom-scrollbar">
                    <!-- Items injected by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="resultOverlay" class="result-overlay">
        <div class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full mx-4">
            <div class="text-indigo-600 text-6xl mb-4">🍱</div>
            <h3 class="text-xl text-slate-500 mb-2">恭喜選中</h3>
            <div id="winnerName" class="text-3xl font-bold text-slate-800 mb-6"></div>
            <button id="closeBtn" class="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700">太棒了，就吃這個！</button>
        </div>
    </div>

    <script>
        const defaultOptions = ["滷肉飯", "便利商店", "乾麵", "水餃", "漢堡", "義大利麵", "壽司", "燒臘便當", "火鍋", "涼麵"];
        let options = [...defaultOptions];
        const colors = ["#6366f1", "#8b5cf6", "#ec4899", "#f43f5e", "#f59e0b", "#10b981", "#06b6d4", "#3b82f6", "#64748b", "#a855f7"];
        
        let currentRotation = 0;
        let isSpinning = false;

        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const itemList = document.getElementById('itemList');
        const itemInput = document.getElementById('itemInput');
        const addBtn = document.getElementById('addBtn');
        const itemCount = document.getElementById('itemCount');
        const resultOverlay = document.getElementById('resultOverlay');
        const winnerName = document.getElementById('winnerName');
        const closeBtn = document.getElementById('closeBtn');

        function initWheel() {
            wheel.innerHTML = '';
            const sliceAngle = 360 / options.length;
            
            options.forEach((opt, i) => {
                const segment = document.createElement('div');
                segment.className = 'segment';
                segment.style.backgroundColor = colors[i % colors.length];
                segment.style.transform = `rotate(${i * sliceAngle}deg) skewY(${90 - sliceAngle}deg)`;
                
                // Add text with counter-skew and rotation to fix readability
                const textSpan = document.createElement('span');
                textSpan.innerText = opt;
                textSpan.style.transform = `skewY(-${90 - sliceAngle}deg) rotate(${sliceAngle / 2}deg)`;
                textSpan.style.position = 'absolute';
                textSpan.style.left = '20px';
                textSpan.style.whiteSpace = 'nowrap';

                segment.appendChild(textSpan);
                wheel.appendChild(segment);
            });
            renderList();
        }

        function renderList() {
            itemList.innerHTML = '';
            itemCount.innerText = `${options.length} 個選項`;
            
            options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100 group';
                div.innerHTML = `
                    <span class="text-slate-700">${opt}</span>
                    <button onclick="removeOption(${i})" class="text-slate-300 hover:text-red-500 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                `;
                itemList.appendChild(div);
            });
        }

        function removeOption(index) {
            if (options.length <= 2) {
                alertBox("最少需要保留 2 個選項才能轉動喔！");
                return;
            }
            options.splice(index, 1);
            initWheel();
        }

        function addOption() {
            const val = itemInput.value.trim();
            if (val && !options.includes(val)) {
                options.push(val);
                itemInput.value = '';
                initWheel();
            }
        }

        function alertBox(msg) {
            // Simple replacement for alert
            itemInput.placeholder = msg;
            setTimeout(() => { itemInput.placeholder = "新增想吃的..."; }, 2000);
        }

        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        spinBtn.onclick = () => {
            if (isSpinning) return;
            
            isSpinning = true;
            spinBtn.disabled = true;
            spinBtn.classList.add('opacity-50');

            const extraSpins = 5 + Math.random() * 5; // 5 to 10 full circles
            const randomDegree = Math.floor(Math.random() * 360);
            currentRotation += (extraSpins * 360) + randomDegree;
            
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                spinBtn.disabled = false;
                spinBtn.classList.remove('opacity-50');
                
                // Calculate which item is at the top (0 degrees)
                // Normalize rotation to 0-359
                const actualDegree = (currentRotation % 360);
                const sliceAngle = 360 / options.length;
                // The needle is at 0 deg, we need to find what landed there
                // Because the wheel rotates clockwise, we subtract from 360
                const index = Math.floor(((360 - actualDegree % 360) % 360) / sliceAngle);
                
                showResult(options[index]);
            }, 4000);
        };

        function showResult(name) {
            winnerName.innerText = name;
            resultOverlay.style.display = 'flex';
            createConfetti();
        }

        closeBtn.onclick = () => {
            resultOverlay.style.display = 'none';
        };

        addBtn.onclick = addOption;
        itemInput.onkeypress = (e) => { if(e.key === 'Enter') addOption(); };

        // Start
        initWheel();
    </script>
</body>
</html>
